name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: quizymode

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          APP_VERSION="$(grep -oPm1 '(?<=<QuizymodeVersion>)[^<]+' Directory.Build.props)"
          echo "app_version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Quizymode.Web/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore Quizymode.sln

      - name: Build web app
        working-directory: src/Quizymode.Web
        run: |
          npm ci
          npm run build

      - name: Run frontend tests with coverage
        working-directory: src/Quizymode.Web
        run: npm run test:coverage

      - name: Verify OpenAPI artifact is in sync (warning mode)
        id: verify_openapi
        shell: pwsh
        run: ./scripts/verify-openapi.ps1 -Configuration Release -WarnOnlyOnArtifactDiff -DiffOutputPath openapi-artifact.diff

      - name: Comment on OpenAPI drift
        if: github.event_name == 'pull_request' && steps.verify_openapi.outputs.artifact_diff_detected == 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          OPENAPI_DIFF_PATH: ${{ steps.verify_openapi.outputs.artifact_diff_path }}
        with:
          script: |
            const fs = require('fs');

            try {
              const marker = '<!-- openapi-artifact-drift -->';
              const diffPath = process.env.OPENAPI_DIFF_PATH;
              const rawDiff = fs.existsSync(diffPath)
                ? fs.readFileSync(diffPath, 'utf8')
                : 'Diff file was not produced by verify-openapi.ps1.';
              const maxLength = 60000;
              const diff = rawDiff.length > maxLength
                ? `${rawDiff.slice(0, maxLength)}\n... diff truncated ...`
                : rawDiff;

              const body = `${marker}
              Warning: the generated OpenAPI artifact drifted from the committed \`docs/openapi/quizymode-api.json\` file during CI.

              This warning is non-blocking on pull requests, but the generated artifact should still be regenerated and committed before merge.

              Run:
              \`\`\`powershell
              ./scripts/verify-openapi.ps1 -Configuration Release
              \`\`\`

              <details>
              <summary>OpenAPI diff</summary>

              \`\`\`diff
              ${diff}
              \`\`\`
              </details>`;

              const { owner, repo } = context.repo;
              const issue_number = context.issue.number;
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100
              });

              const existing = comments.find(comment =>
                comment.user?.type === 'Bot' && comment.body?.includes(marker)
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            } catch (error) {
              console.log(`Skipping OpenAPI drift comment: ${error.message}`);
            }

      - name: Clear OpenAPI drift comment
        if: github.event_name == 'pull_request' && steps.verify_openapi.outputs.artifact_diff_detected != 'true'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const marker = '<!-- openapi-artifact-drift -->';
              const { owner, repo } = context.repo;
              const issue_number = context.issue.number;
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100
              });

              const existing = comments.find(comment =>
                comment.user?.type === 'Bot' && comment.body?.includes(marker)
              );

              if (!existing) {
                return;
              }

              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id: existing.id
              });
            } catch (error) {
              console.log(`Skipping OpenAPI drift comment cleanup: ${error.message}`);
            }

      - name: Run architecture tests
        run: |
          dotnet test tests/Quizymode.Api.Tests/Quizymode.Api.Tests.csproj \
            --no-restore \
            --verbosity normal \
            --filter "FullyQualifiedName~Architecture" \
            --logger "trx;LogFileName=architecture-tests.trx" \
            --results-directory TestResults/architecture

      - name: Run backend tests with coverage
        run: dotnet test Quizymode.sln --no-restore --verbosity normal --collect:"XPlat Code Coverage" --settings tests/Quizymode.Api.Tests/coverlet.runsettings --results-directory TestResults/coverage

      - name: Summarize coverage
        id: summarize_coverage
        shell: pwsh
        run: ./scripts/summarize-coverage.ps1 -ResultsDirectory TestResults/coverage -MarkdownOutputPath coverage-summary.md -JsonOutputPath coverage-summary.json -FrontendCoverageJsonPath src/Quizymode.Web/coverage/coverage-summary.json -ArchitectureResultsPath TestResults/architecture/architecture-tests.trx

      - name: Comment on coverage summary
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          COVERAGE_SUMMARY_PATH: ${{ steps.summarize_coverage.outputs.coverage_markdown_path }}
        with:
          script: |
            const fs = require('fs');

            try {
              const marker = '<!-- coverage-summary -->';
              const summaryPath = process.env.COVERAGE_SUMMARY_PATH;
              const summary = summaryPath && fs.existsSync(summaryPath)
                ? fs.readFileSync(summaryPath, 'utf8')
                : 'Coverage summary was not produced.';

              const body = `${marker}
              ${summary}`;

              const { owner, repo } = context.repo;
              const issue_number = context.issue.number;
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100
              });

              const existing = comments.find(comment =>
                comment.user?.type === 'Bot' && comment.body?.includes(marker)
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body
                });
                return;
              }

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            } catch (error) {
              console.log(`Skipping coverage summary comment: ${error.message}`);
            }

      - name: Docker metadata
        id: meta
        run: |
          IMAGE_ID="${REGISTRY}/${GITHUB_REPOSITORY_OWNER,,}/${IMAGE_NAME}"
          echo "image=${IMAGE_ID}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (no push)
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/Quizymode.Api/Dockerfile
          push: false
          tags: ${{ steps.meta.outputs.image }}:ci-${{ github.run_number }}
          build-args: |
            APP_VERSION=${{ steps.app_version.outputs.app_version }}
            SOURCE_REVISION_ID=${{ github.sha }}

      - name: Build and push image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./src/Quizymode.Api/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ steps.meta.outputs.image }}:latest
          build-args: |
            APP_VERSION=${{ steps.app_version.outputs.app_version }}
            SOURCE_REVISION_ID=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
