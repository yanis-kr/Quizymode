name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

jobs:
  deploy-container:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Fetch environment variables from active deployment
        run: |
          aws lightsail get-container-service-deployments \
            --service-name container-service-1 \
            --query 'deployments[?state==`ACTIVE`] | [0].containers.api.environment' \
            --output json > /tmp/env.json

          # Fall back to most recent deployment if none is currently ACTIVE
          if [ "$(cat /tmp/env.json)" = "null" ]; then
            aws lightsail get-container-service-deployments \
              --service-name container-service-1 \
              --query 'deployments[0].containers.api.environment' \
              --output json > /tmp/env.json
          fi

      - name: Create LightSail deployment
        env:
          IMAGE: ghcr.io/yanis-kr/quizymode:${{ github.event.workflow_run.head_sha }}
        run: |
          CONTAINERS=$(jq -n \
            --arg image "$IMAGE" \
            --slurpfile env /tmp/env.json \
            '{api: {image: $image, environment: $env[0], ports: {"8080": "HTTP"}}}')

          aws lightsail create-container-service-deployment \
            --service-name container-service-1 \
            --containers "$CONTAINERS" \
            --public-endpoint '{
              "containerName": "api",
              "containerPort": 8080,
              "healthCheck": {
                "path": "/health",
                "intervalSeconds": 10,
                "timeoutSeconds": 5,
                "successCodes": "200-299",
                "unhealthyThreshold": 2,
                "healthyThreshold": 2
              }
            }'

      - name: Wait for deployment to become ACTIVE
        run: |
          for i in $(seq 1 40); do
            STATE=$(aws lightsail get-container-service-deployments \
              --service-name container-service-1 \
              --query 'deployments[0].state' --output text)
            echo "[$i/40] state=$STATE"
            [ "$STATE" = "ACTIVE" ] && exit 0
            [ "$STATE" = "FAILED" ] && { echo "Deployment FAILED"; exit 1; }
            sleep 15
          done
          echo "Timed out after 10 minutes"
          exit 1

  deploy-ui:
    needs: deploy-container
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/Quizymode.Web/package-lock.json

      - name: Build web app
        working-directory: src/Quizymode.Web
        env:
          VITE_GIT_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync to S3
        working-directory: src/Quizymode.Web/dist
        run: |
          # General assets — long-lived immutable cache
          aws s3 sync . s3://quizymode-web/ \
            --delete --exact-timestamps \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" --exclude "*.json" --exclude "*.css" --exclude "*.js"

          # CSS — explicit content-type (required for Safari iOS)
          aws s3 sync . s3://quizymode-web/ \
            --exclude "*" --include "*.css" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "text/css"

          # JS — explicit content-type
          aws s3 sync . s3://quizymode-web/ \
            --exclude "*" --include "*.js" \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/javascript"

          # HTML — never cache
          aws s3 sync . s3://quizymode-web/ \
            --exclude "*" --include "*.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

          # JSON — never cache
          aws s3 sync . s3://quizymode-web/ \
            --exclude "*" --include "*.json" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/json"

          [ -f robots.txt ] && aws s3 cp robots.txt s3://quizymode-web/robots.txt \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/plain"

          [ -f sitemap.xml ] && aws s3 cp sitemap.xml s3://quizymode-web/sitemap.xml \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "application/xml"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id EH1DS9REH8KR5 \
            --paths "/*"
