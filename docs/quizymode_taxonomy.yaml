concerns:
- niche exam families like lsat mcat bar pmp scrum and real-estate are not first-class yet
- rare languages fit under other-langs until one earns enough volume for its own l1
- cross-disciplinary topics like biostats legal-history sports-business and econ-history will use general or mixed
- some country-specific civics and law content outside us-civics or comparative-gov may feel broad
- niche humanities like dance architecture comics and design-theory are covered only indirectly
- smaller sports like cricket rugby cycling and motorsport would start in general unless volume grows
- fast-moving trivia like memes influencers and live pop moments may need periodic refreshes
- this is browse-first so edge cases should start in general or mixed and earn new buckets later
